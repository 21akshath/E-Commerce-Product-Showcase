<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechBazaar - E-Commerce Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
 <header>
  <h1>SkyMart</h1>   <!-- Updated name -->
  <input type="text" id="searchBar" placeholder="Search products...">
  <select id="categoryFilter">
    <option value="all">All Categories</option>
    <option value="accessories">Accessories</option>
    <option value="laptop">Laptop</option>
    <option value="smartphone">Smartphone</option>
    <option value="gaming">Gaming</option>
    <option value="electronics">Electronics</option>
    <option value="camera">Camera</option>
    <option value="tablet">Tablet</option>
    <option value="fitness">Fitness</option>
  </select>
  <select id="priceSort">
    <option value="default">Sort by Price</option>
    <option value="low">Low to High</option>
    <option value="high">High to Low</option>
  </select>
  <div id="cartIcon">🛒 <span id="cartCount">0</span></div>
</header>
  <!-- Main -->
  <main>
    <h2>Our Products</h2>
    <div id="productsContainer"></div>
  </main>

  <!-- Product Details Modal -->
  <div id="detailsModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="detailsTitle"></h2>
      <img id="detailsImage" alt="">
      <p id="detailsPrice"></p>
      <button id="addToCartFromDetails">Add to Cart</button>

      <h3>User Reviews</h3>
      <ul id="reviewsList"></ul>
      <textarea id="reviewInput" placeholder="Write a review..."></textarea>
      <br>
      <label>Rating:</label>
      <select id="starRating">
        <option value="1">⭐</option>
        <option value="2">⭐⭐</option>
        <option value="3">⭐⭐⭐</option>
        <option value="4">⭐⭐⭐⭐</option>
        <option value="5">⭐⭐⭐⭐⭐</option>
      </select>
      <button id="submitReview">Submit</button>
    </div>
  </div>

  <!-- Checkout Modal -->
  <div id="checkoutModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Your Cart</h2>
      <ul id="modalCartItems"></ul>
      <p id="modalTotalPrice"></p>
      <button id="confirmCheckout">Confirm Checkout</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
