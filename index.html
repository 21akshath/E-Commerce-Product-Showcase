<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ShopDemo - E-Commerce</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>ShopDemo 🛍️</h1>
    <div class="controls">
      <input id="searchBox" placeholder="Search products..." onkeyup="searchProducts()" />
      <select id="sortSelect" onchange="sortProducts()">
        <option value="">Sort</option><option value="low">Price ↑</option><option value="high">Price ↓</option><option value="az">A–Z</option>
      </select>
      <button onclick="toggleDarkMode()">🌙</button>
      <button id="cartBtn">Cart (<span id="cartCount">0</span>)</button>
    </div>
  </header>

  <main>
    <section id="productList" class="product-grid"></section>
  </main>

  <!-- Product Modal -->
  <div id="productModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal()">&times;</span>
      <img id="modalImg" alt="" />
      <h2 id="modalName"></h2>
      <p id="modalPrice"></p>
      <p id="modalDesc"></p>
      Qty: <input id="qtyInput" type="number" min="1" value="1" style="width:60px"/>
      <div style="margin-top:12px"><button onclick="addFromModal()" class="add-btn">Add to Cart</button></div>
    </div>
  </div>

  <!-- Cart Modal -->
  <div id="cartModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeCart()">&times;</span>
      <h2>Your Cart</h2>
      <div id="cartItems"></div>
      <div id="cartTotal"></div>
      <div style="margin-top:12px"><button onclick="checkout()" class="checkout-btn">Checkout</button></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
