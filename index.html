<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Product Showcase 🛒</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🛒 E-Commerce Store</h1>
  <div class="controls">
    <input type="text" id="searchBox" placeholder="Search products..." onkeyup="searchProducts()">
    <select id="sortSelect" onchange="sortProducts()">
      <option value="">Sort By</option>
      <option value="low">Price: Low to High</option>
      <option value="high">Price: High to Low</option>
      <option value="az">Name: A-Z</option>
    </select>
    <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
    <button onclick="clearSearch()">❌ Clear</button>
    <button id="cartBtn">🛒 Cart (<span id="cartCount">0</span>)</button>
  </div>
</header>

<main>
  <div id="productList" class="product-list"></div>
</main>

<!-- Cart Modal -->
<div id="cartModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeCart()">&times;</span>
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <h3 id="cartTotal"></h3>
    <button onclick="checkout()">Checkout</button>
  </div>
</div>

<!-- Product Details Modal -->
<div id="productModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <img id="modalImg" src="" alt="">
    <h3 id="modalName"></h3>
    <p id="modalCategory"></p>
    <p id="modalPrice"></p>
    <p id="modalDesc"></p>
    <div id="avgRating"></div>
    <div id="reviews"></div>
    <div class="review-form">
      <input type="text" id="reviewInput" placeholder="Write a review...">
      <select id="ratingInput">
        <option value="5">⭐ 5</option>
        <option value="4">⭐ 4</option>
        <option value="3">⭐ 3</option>
        <option value="2">⭐ 2</option>
        <option value="1">⭐ 1</option>
      </select>
      <button onclick="addReview()">Submit</button>
    </div>
    <button id="modalAddCart">Add to Cart</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
